version: "3.9"

services:
  web:
    build: .
    command: gunicorn rainwise.wsgi:application --bind 0.0.0.0:8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  controller:
    build: .
    command: python manage.py controller
    env_file: .env
    volumes:
      - ./data:/data
    restart: unless-stopped
