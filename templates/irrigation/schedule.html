{% extends "base.html" %}

{% block title %}Schedule | Rainwise{% endblock %}

{% block head %}
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Schedule</h1>

<div class="mb-3">
  <a class="btn btn-primary" href="{% url 'schedule_create' %}">New rule</a>
</div>

<div class="card mb-4">
  <div class="card-body">
    <div id="calendar"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const calendarEl = document.getElementById("calendar");
      const config = {
        initialView: "timeGridWeek",
        height: "auto",
        nowIndicator: true,
        events: "{% url 'calendar_events' %}",
        eventDidMount: function (info) {
          info.el.addEventListener("dblclick", function () {
            const editUrl = info.event.extendedProps.edit_url;
            if (editUrl) {
              window.location.href = editUrl;
            }
          });
        },
      };
      {% if slot_min_time %}
      config.slotMinTime = "{{ slot_min_time }}";
      {% endif %}
      {% if slot_max_time %}
      config.slotMaxTime = "{{ slot_max_time }}";
      {% endif %}
      const calendar = new FullCalendar.Calendar(calendarEl, config);
      calendar.render();
    });
  </script>
{% endblock %}
